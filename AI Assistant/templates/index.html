<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with AI</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        #chat-container {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .message {
            padding: 10px 15px;
            margin: 5px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 14px;
            display: inline-block;
        }

        .user-message {
            background: #007AFF;
            align-self: flex-end;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .ai-message {
            background: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        #input-container {
            display: flex;
            align-items: center;
            padding: 10px;
            border-top: 1px solid #444;
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            background: #222;
            color: white;
            outline: none;
            padding-left: 15px;
        }

        button {
            background: none;
            border: none;
            color: #007AFF;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 10px;
        }
    </style>
</head>

<body>
    <h1>Chat with AI</h1>
    <div id="chat-container">
        <div id="chat-box"></div>
        <div id="input-container">
            <input type="text" id="user-message" placeholder="Message...">
            <button onclick="sendMessage()">➤</button>
            <button onclick="startVoiceRecognition()">🎤</button>
        </div>
    </div>

    <script>
        let isVoiceInput = false;

        function sendMessage() {
            let inputField = document.getElementById('user-message');
            let message = inputField.value.trim();
            if (!message) return;

            // Replace *text* with italic and **text** with bold
            message = message.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>');

            isVoiceInput = false;
            displayMessage(message, 'user');
            processMessage(message);

            // Clear input field after sending
            inputField.value = '';
        }

        function processMessage(message) {
            $.ajax({
                url: 'https://c984-154-198-93-22.ngrok-free.app/chat',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ message: message }),
                success: function (response) {
                    displayMessage(response.response, 'ai');
                    if (isVoiceInput) speakResponse(response.response);
                },
                error: function () {
                    displayMessage("Error: Unable to get a response.", 'ai');
                }
            });
        }

        function displayMessage(text, sender) {
            let chatBox = document.getElementById('chat-box');
            let messageElement = document.createElement('div');
            messageElement.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');

            // Replace *text* with italic and **text** with bold
            text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>');

            messageElement.innerHTML = text; // Use innerHTML to render formatting
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startVoiceRecognition() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Your browser doesn't support speech recognition.");
                return;
            }

            let recognition = new webkitSpeechRecognition();
            recognition.lang = "en-US";
            recognition.start();

            recognition.onresult = function (event) {
                let voiceMessage = event.results[0][0].transcript;
                isVoiceInput = true;
                displayMessage(voiceMessage, 'user');
                processMessage(voiceMessage);
            };

            recognition.onerror = function () {
                alert("Sorry, I couldn't understand what you said.");
            };
        }

        function speakResponse(responseText) {
            let speech = new SpeechSynthesisUtterance(responseText);
            speech.lang = "en-US";
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>

</html>
